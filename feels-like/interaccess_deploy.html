window.setFaceApiScriptStatus = function setFaceApiScriptStatus(status, detail) {
  window.faceApiScriptStatus = status;
  const statusEl = document.getElementById('faceApiStatus');
  const detailEl = document.getElementById('faceApiDetail');
  if (!statusEl || !detailEl) return;

  if (status === 'ready') {
    statusEl.textContent = 'face-api.js ready';
    detailEl.textContent = detail || 'Local script loaded.';
    return;
  }
  if (status === 'error') {
    statusEl.textContent = 'face-api.js error';
    detailEl.textContent = detail || 'Local script failed to load.';
    return;
  }

  statusEl.textContent = 'face-api.js loading';
  detailEl.textContent = detail || 'Loading local script...';
};

<script>
const USER_AGENT = navigator.userAgent || '';
const IS_APPLE_TOUCH_DEVICE = /iPad|iPhone|iPod/.test(USER_AGENT)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const IS_SAFARI_BROWSER = /Safari/i.test(USER_AGENT)
  && !/CriOS|Chrome|Chromium|EdgiOS|FxiOS/i.test(USER_AGENT);
const USE_IPAD_SAFARI_PERF_PROFILE = IS_APPLE_TOUCH_DEVICE && IS_SAFARI_BROWSER;

if (USE_IPAD_SAFARI_PERF_PROFILE) {
  document.body.classList.add('iosSafariPerf');
}

// ── PERSON REGISTRY ──────────────────────────────────────────
const people = [];
let activePerson = null;
let lastTransitionedPerson = null;
let pulseConfirmedWinnerKey = null;
let pulsePendingWinnerKey = null;
let pulsePendingSinceMs = 0;
let pulseConfirmedWinnerSeenAtMs = 0;

// ── CLOUD PARAMETER SPACE ────────────────────────────────────
const PARAM_RANGES = {
  skyH: { min: 190, max: 210 }, skyS: { min: 12, max: 78 }, skyV: { min: 22, max: 85 },
  turbulence: { min: 0, max: 4 }, noiseOffset: { min: 0.05, max: 0.78 }, noiseCeiling: { min: 0.08, max: 0.88 },
};
const PARAM_KEYS = Object.keys(PARAM_RANGES);

function normalizedToCloud(norm) {
  const cloud = {};
  PARAM_KEYS.forEach((k, i) => { const r = PARAM_RANGES[k]; cloud[k] = r.min + norm[i] * (r.max - r.min); });
  return cloud;
}

// ── CYCLING POISSON ──────────────────────────────────────────
const BATCH_SIZE = 30;
const batchNorms = [];

const EDGE_ANCHORS = [
  [0.0, 1.0, 0.8, 0.0, 0.2, 0.9],
  [1.0, 0.0, 0.1, 1.0, 0.9, 0.0],
  [0.5, 0.8, 1.0, 0.6, 0.0, 1.0],
  [0.0, 0.2, 0.0, 0.3, 0.8, 0.1],
];

// Turbulence (index 3) biased toward lower values via power curve
function randomCandidate() {
  return Array.from({ length: 6 }, (_, i) => {
    if (i === 3) return Math.random() ** 1.5;
    return Math.random();
  });
}

function findMaximallyDifferent() {
  if (batchNorms.length === 0) {
    return EDGE_ANCHORS[Math.floor(Math.random() * EDGE_ANCHORS.length)].slice();
  }
  let bestPoint = null, bestMinDist = -1;
  for (let c = 0; c < 5000; c++) {
    const cand = randomCandidate();
    let minD = Infinity;
    for (const ex of batchNorms) { const d = dist6(cand, ex); if (d < minD) minD = d; }
    if (minD > bestMinDist) { bestMinDist = minD; bestPoint = cand; }
  }
  return bestPoint;
}

function registerPerson() {
  if (batchNorms.length >= BATCH_SIZE) batchNorms.length = 0;
  const norm = findMaximallyDifferent();
  batchNorms.push(norm);
  return addPersonFromNorm(norm);
}

function encodeNorm(norm) {
  return norm
    .map(v => Math.round(clamp(v, 0, 1) * 999).toString(36).padStart(2, '0'))
    .join('')
    .toUpperCase();
}

function decodeNorm(code) {
  if (!/^[0-9A-Z]{12}$/.test(code)) return null;
  const norm = [];
  for (let i = 0; i < code.length; i += 2) {
    const value = parseInt(code.slice(i, i + 2), 36);
    if (!Number.isFinite(value) || value > 999) return null;
    norm.push(value / 999);
  }
  return norm;
}

function addPersonFromNorm(norm) {
  const personCode = encodeNorm(norm);
  const existing = people.find(person => person.personCode === personCode);
  if (existing) return existing;
  const id = people.length + 1;
  const person = { id, norm, personCode, cloudParams: normalizedToCloud(norm) };
  people.push(person);
  return person;
}

// ── SUN PULSE ───────────────────────────────────────────────
let sunPulseLevel = 0;
let sunPulseMode = 'idle';
let sunPulseHoverPhase = 0;
let sunPulseLastUpdateMs = 0;
let sunPulseHasFaceLatch = false;
let sunPulseTransitionCommitted = false;
let sunPulseTransitionPending = false;
let pendingTransitionPerson = null;
let sunPulseLockedWinnerKey = null;
let sunPulseLockedWinnerPerson = null;
let sunPulseLockedWinnerVisible = false;
let transitionFlashLevel = 0;
let transitionFlashDirection = 0;
let transitionFlashSpread = 0;
let sunPulseCurrentFallPerMs = 0;
const SUN_PULSE_FILL_MS = 2000;
const SUN_PULSE_RISE_PER_MS = 1 / SUN_PULSE_FILL_MS;
const SUN_PULSE_FALL_PER_MS = 1 / SUN_PULSE_FILL_MS;
const TRANSITION_FLASH_RISE_PER_MS = 1 / 450;
const TRANSITION_FLASH_FALL_PER_MS = 1 / 1300;
const TRANSITION_FLASH_SPREAD_PER_MS = 1 / 1700;
const SUN_PULSE_TRIGGER_LEVEL = 0.82;
const SUN_PULSE_HOVER_MIN = 0.86;
const SUN_PULSE_HOVER_MAX = 1.0;
const SUN_PULSE_HOVER_SPEED = 0.0075;

function clearSunPulseWinnerLock() {
  sunPulseLockedWinnerKey = null;
  sunPulseLockedWinnerPerson = null;
  sunPulseLockedWinnerVisible = false;
}

function startSunPulseAdvance() {
  if (sunPulseTransitionCommitted) return;
  sunPulseMode = 'advancing';
}

function startSunPulseRecede() {
  sunPulseCurrentFallPerMs = SUN_PULSE_FALL_PER_MS;
  sunPulseMode = sunPulseLevel > 0 ? 'receding' : 'idle';
}

function startSunPulseHover() {
  sunPulseMode = 'hovering';
}

function updateSunPulse(now) {
  if (!sunPulseLastUpdateMs) {
    sunPulseLastUpdateMs = now;
    return;
  }

  const dt = Math.min(80, now - sunPulseLastUpdateMs);
  sunPulseLastUpdateMs = now;

  if (sunPulseMode === 'advancing') {
    sunPulseLevel = clamp(sunPulseLevel + dt * SUN_PULSE_RISE_PER_MS, 0, 1);
    if (sunPulseLevel >= 1) {
      sunPulseLevel = 1;
      sunPulseMode = 'idle';
      if (!sunPulseTransitionCommitted && sunPulseLockedWinnerVisible && sunPulseLockedWinnerPerson) {
        commitSunPulseTransition(sunPulseLockedWinnerPerson);
      }
    }
  } else if (sunPulseMode === 'receding') {
    sunPulseLevel = clamp(sunPulseLevel - dt * sunPulseCurrentFallPerMs, 0, 1);
    if (sunPulseLevel <= 0) {
      sunPulseLevel = 0;
      sunPulseMode = 'idle';
      sunPulseHoverPhase = 0;
      sunPulseCurrentFallPerMs = SUN_PULSE_FALL_PER_MS;
      if (!sunPulseTransitionCommitted) {
        clearSunPulseWinnerLock();
      }
    }
  } else if (sunPulseMode === 'hovering') {
    sunPulseHoverPhase += dt * SUN_PULSE_HOVER_SPEED;
    const wave = (Math.sin(sunPulseHoverPhase) + 1) * 0.5;
    sunPulseLevel = lerp(SUN_PULSE_HOVER_MIN, SUN_PULSE_HOVER_MAX, wave);
  }

  if (transitionFlashDirection > 0) {
    transitionFlashLevel = clamp(transitionFlashLevel + dt * TRANSITION_FLASH_RISE_PER_MS, 0, 1);
    transitionFlashSpread = clamp(transitionFlashSpread + dt * TRANSITION_FLASH_SPREAD_PER_MS, 0, 1);
    if (transitionFlashLevel >= 1) {
      transitionFlashLevel = 1;
      transitionFlashDirection = -1;
    }
  } else if (transitionFlashDirection < 0) {
    transitionFlashLevel = clamp(transitionFlashLevel - dt * TRANSITION_FLASH_FALL_PER_MS, 0, 1);
    transitionFlashSpread = clamp(transitionFlashSpread + dt * TRANSITION_FLASH_SPREAD_PER_MS, 0, 1);
    if (transitionFlashLevel <= 0) {
      transitionFlashLevel = 0;
      transitionFlashDirection = 0;
      transitionFlashSpread = 0;
    }
  }
}

function getSunPulseIntensity() {
  return sunPulseLevel;
}

// ── CLOUD RENDERER ───────────────────────────────────────────
const OpenSimplex=(function(){const S=-0.211324865405187,Q=0.366025403784439,N=47;const G=[5,2,2,5,-5,2,-2,5,5,-2,2,-5,-5,-2,-2,-5];function sd(s){s=BigInt(s);const p=new Uint8Array(256),r=new Uint8Array(256);for(let i=0;i<256;i++)r[i]=i;for(let k=0;k<3;k++)s=s*6364136223846793005n+1442695040888963407n;for(let i=255;i>=0;i--){s=s*6364136223846793005n+1442695040888963407n;let v=Number((s+31n)%BigInt(i+1));if(v<0)v+=i+1;p[i]=r[v];r[v]=r[i]}return p}return function(s){const p=sd(s);return{noise2D(x,y){const so=(x+y)*S,xs=x+so,ys=y+so;const xsb=Math.floor(xs),ysb=Math.floor(ys);const qo=(xsb+ysb)*Q;const dx0=x-(xsb+qo),dy0=y-(ysb+qo);const xi=xs-xsb,yi=ys-ysb,ins=xi+yi;let v=0;const c=(ddx,ddy,xv,yv)=>{let a=2-ddx*ddx-ddy*ddy;if(a>0){a*=a;const i=p[(p[xv&255]+yv)&255]%8*2;v+=a*a*(G[i]*ddx+G[i+1]*ddy)}};c(dx0-1-Q,dy0-Q,xsb+1,ysb);c(dx0-Q,dy0-1-Q,xsb,ysb+1);c(dx0,dy0,xsb,ysb);if(ins>1)c(dx0-1-2*Q,dy0-1-2*Q,xsb+1,ysb+1);else if(xi>yi)c(dx0+1,dy0-1,xsb-1,ysb+1);else c(dx0-1,dy0+1,xsb+1,ysb-1);return v/N}}}})();
const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v, rnd=(a,b)=>a+Math.random()*(b-a), rndI=(a,b)=>Math.floor(rnd(a,b+1));

function drawPulseOverlay(ctx, canW, canH) {
  const pulse = getSunPulseIntensity();
  if (pulse <= 0) return;
  const easedPulse = Math.pow(pulse, 0.68);
  const alpha = easedPulse * 0.92;
  const cx = canW / 2, cy = canH / 2;
  const innerR = Math.min(canW, canH) * 0.32;
  const outerR = Math.sqrt(cx * cx + cy * cy);
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const grad = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
  grad.addColorStop(0, 'rgba(255,250,235,0)');
  grad.addColorStop(0.28, `rgba(255,246,225,${clamp(alpha * 0.04, 0, 1)})`);
  grad.addColorStop(0.52, `rgba(255,248,232,${clamp(alpha * 0.16, 0, 1)})`);
  grad.addColorStop(0.72, `rgba(255,252,244,${clamp(alpha * 0.46, 0, 1)})`);
  grad.addColorStop(0.88, `rgba(255,255,255,${clamp(alpha * 0.88, 0, 1)})`);
  grad.addColorStop(1, `rgba(255,255,255,${clamp(alpha, 0, 1)})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canW, canH);
  ctx.restore();
}

function drawTransitionFlashOverlay(ctx, canW, canH) {
  if (transitionFlashLevel <= 0) return;
  const alpha = Math.pow(transitionFlashLevel, 1.05) * 0.34;
  const cx = canW / 2, cy = canH / 2;
  const spread = Math.pow(transitionFlashSpread, 0.9);
  const outerR = Math.min(canW, canH) * (0.14 + spread * 0.82);
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR);
  coreGrad.addColorStop(0, `rgba(255,255,255,${clamp(alpha, 0, 1)})`);
  coreGrad.addColorStop(0.16, `rgba(255,252,245,${clamp(alpha * 0.92, 0, 1)})`);
  coreGrad.addColorStop(0.38, `rgba(255,247,228,${clamp(alpha * 0.56, 0, 1)})`);
  coreGrad.addColorStop(0.68, `rgba(255,255,255,${clamp(alpha * 0.18, 0, 1)})`);
  coreGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = coreGrad;
  ctx.fillRect(0, 0, canW, canH);
  ctx.restore();
}

function updateFps(now) {
  if (!fpsEl) return;
  fpsFrames++;
  if (now - fpsLast >= 1000) {
    const fps = Math.round(fpsFrames * 1000 / (now - fpsLast));
    fpsEl.textContent = `${fps} fps · regen ${regenTime}ms`;
    fpsFrames = 0;
    fpsLast = now;
  }
}

function formatCloudParamValue(key, value) {
  return key === 'turbulence' || key === 'noiseOffset' || key === 'noiseCeiling'
    ? value.toFixed(3)
    : value.toFixed(1);
}

function formatCloudParamLine(label, values) {
  return `${label}: ${PARAM_KEYS
    .map((key) => `${key} ${formatCloudParamValue(key, values[key])}`)
    .join(' · ')}`;
}

function getCloudParamStep(key) {
  if (key === 'skyH' || key === 'skyS' || key === 'skyV') return 1;
  if (key === 'turbulence') return 0.05;
  if (key === 'noiseOffset' || key === 'noiseCeiling') return 0.01;
  return 0.01;
}

function adjustCloudCurrentParam(key, direction) {
  const range = PARAM_RANGES[key];
  if (!range || !Number.isFinite(direction) || direction === 0) return;
  const step = getCloudParamStep(key) * direction;
  cloudCurrent[key] = clamp(cloudCurrent[key] + step, range.min, range.max);
}

function updateCloudDebug() {
  if (!cloudDebugBodyEl) return;
  const winnerSnapshot = getLargestVisibleFaceAcrossPanels();
  const winnerPerson = getPersonForWinnerSnapshot(winnerSnapshot);
  const targetValues = cloudTarget;
  const transitionTargetPerson = activePerson || pendingTransitionPerson || lastTransitionedPerson;
  const transitionTargetLabel = transitionTargetPerson ? formatPersonLabel(transitionTargetPerson) : 'none';
  const winnerLabel = winnerPerson ? formatPersonLabel(winnerPerson) : 'none';
  const transitionDistance = getCloudTransitionDistance();
  const isSettled = isCloudTransitionSettled();

  if (cloudDebugLabelEl) cloudDebugLabelEl.textContent = `Transition target ${transitionTargetLabel}`;
  if (cloudDetectedLabelEl) cloudDetectedLabelEl.textContent = `Detected ${winnerLabel}`;
  if (cloudTransitionStatusEl) {
    cloudTransitionStatusEl.textContent = isSettled
      ? `State stable · distance ${transitionDistance.toFixed(3)}`
      : `State transitioning · distance ${transitionDistance.toFixed(3)}`;
  }
  if (cloudSunburstStatusEl) {
    cloudSunburstStatusEl.textContent = `Sunburst ${sunburstEnabled ? 'on' : 'off'}`;
  }
  cloudDebugBodyEl.innerHTML = PARAM_KEYS.map((key) => `
    <tr>
      <td>${key}</td>
      <td>
        <div class="cloudCurrentControl">
          <button class="cloudAdjustButton" data-cloud-param="${key}" data-cloud-dir="-1" type="button">-</button>

      </td>
      <td>${formatCloudParamValue(key, targetValues[key])}</td>

  `).join('');
}

function formatPersonLabel(person) {

function isSamePerson(a, b) {
  return Boolean(a && b && a.id === b.id);
}

function setActivePerson(person) {
  activePerson = person;
  lastTransitionedPerson = person;
  cloudTarget = { ...person.cloudParams };
}

function stopActivePersonShift() {
  activePerson = null;

}

function resetWinnerPulseTracking() {
  pulseConfirmedWinnerKey = null;
  pulsePendingWinnerKey = null;
  pulsePendingSinceMs = 0;
  pulseConfirmedWinnerSeenAtMs = 0;
}

function getCloudTransitionDistance() {
  let distance = 0;
  let hueDelta = cloudTarget.skyH - cloudCurrent.skyH;
  if (hueDelta > 180) hueDelta -= 360;
  if (hueDelta < -180) hueDelta += 360;
  distance += Math.abs(hueDelta) / 20;
  distance += Math.abs(cloudTarget.skyS - cloudCurrent.skyS) / 66;
  distance += Math.abs(cloudTarget.skyV - cloudCurrent.skyV) / 63;
  distance += Math.abs(cloudTarget.turbulence - cloudCurrent.turbulence) / 4;
  distance += Math.abs(cloudTarget.noiseOffset - cloudCurrent.noiseOffset) / 0.73;
  distance += Math.abs(cloudTarget.noiseCeiling - cloudCurrent.noiseCeiling) / 0.8;
  return distance;
}

function isCloudTransitionSettled() {
  return getCloudTransitionDistance() <= 0.035;
}

function isCloudReadyForNewWinner() {
  return getCloudTransitionDistance() <= CLOUD_NEW_WINNER_READY_DISTANCE;
}

function resetSunPulseCycle() {
  sunPulseTransitionPending = false;
  sunPulseTransitionCommitted = false;
  pendingTransitionPerson = null;
  clearSunPulseWinnerLock();
}

function commitSunPulseTransition(person) {
  if (!person || sunPulseTransitionCommitted || sunPulseTransitionPending) return;
  sunPulseTransitionPending = false;
  pendingTransitionPerson = null;
  sunPulseTransitionCommitted = true;
  transitionFlashLevel = 0;
  transitionFlashDirection = 1;
  transitionFlashSpread = 0;
  sunPulseMode = 'idle';
  sunPulseLevel = 0;
  sunPulseHoverPhase = 0;
  setActivePerson(person);
}

function shouldPlaySunPulseForPerson(person) {
  if (!person) return false;
  if (isSamePerson(person, activePerson)) return false;
  if (isSamePerson(person, pendingTransitionPerson)) return false;
  if (isSamePerson(person, lastTransitionedPerson)) return false;
  return true;
}

function createTrackedPerson() {
  return registerPerson();
}

function getBoxCenter(box) {
  return {
    x: box.x + box.width * 0.5,
    y: box.y + box.height * 0.5,
  };
}

function getPointsCenter(points) {
  if (!points || !points.length) return { x: 0, y: 0 };
  let x = 0;
  let y = 0;
  for (const point of points) {
    x += point.x;
    y += point.y;
  }
  return { x: x / points.length, y: y / points.length };
}

function getAreaRatio(a, b) {
  const areaA = Math.max(1, getFaceArea(a));
  const areaB = Math.max(1, getFaceArea(b));
  return areaA > areaB ? areaA / areaB : areaB / areaA;
}

function getSpatialMatchScore(a, b) {
  const centerA = getBoxCenter(a);
  const centerB = getBoxCenter(b);
  const dx = centerA.x - centerB.x;
  const dy = centerA.y - centerB.y;
  const distance = Math.sqrt(dx * dx + dy * dy);
  const sizeRef = Math.max(
    1,
    Math.sqrt(getFaceArea(a)),
    Math.sqrt(getFaceArea(b))
  );
  const normalizedDistance = distance / sizeRef;
  const areaRatio = getAreaRatio(a, b);
  return normalizedDistance + (areaRatio - 1) * 0.35;
}

function isSpatialMatch(a, b) {
  if (!a || !b) return false;
  const areaRatio = getAreaRatio(a, b);
  if (areaRatio > 2.8) return false;
  return getSpatialMatchScore(a, b) < 0.9;
}

function isDetectionUsable(panelState, detection) {
  if (!detection || !detection.detection || detection.detection.score < getMinDetectionScore(panelState)) return false;
  if (!detection.landmarks) return false;

  const leftEye = getPointsCenter(detection.landmarks.getLeftEye());
  const rightEye = getPointsCenter(detection.landmarks.getRightEye());
  const nose = getPointsCenter(detection.landmarks.getNose());
  const mouth = getPointsCenter(detection.landmarks.getMouth());
  const eyeMidX = (leftEye.x + rightEye.x) * 0.5;
  const eyeDist = Math.max(1, Math.abs(rightEye.x - leftEye.x));

  const noseOffset = Math.abs(nose.x - eyeMidX) / eyeDist;
  const mouthOffset = Math.abs(mouth.x - eyeMidX) / eyeDist;
  const eyeLevelDelta = Math.abs(rightEye.y - leftEye.y) / eyeDist;

  return noseOffset <= 0.36 && mouthOffset <= 0.38 && eyeLevelDelta <= 0.25;
}

function cloneDescriptor(descriptor) {
  if (!descriptor) return null;
  return descriptor.slice ? descriptor.slice() : new Float32Array(descriptor);
}

function getDescriptorSamples(entry) {
  if (!entry) return [];
  if (entry.descriptorSamples && entry.descriptorSamples.length) {
    return entry.descriptorSamples;
  }
  return entry.descriptor ? [entry.descriptor] : [];
}

function getBestDescriptorDistance(entry, descriptor) {
  if (!entry || !descriptor) return Infinity;
  const samples = getDescriptorSamples(entry);
  if (!samples.length) return Infinity;

  let bestDistance = Infinity;
  for (const sample of samples) {
    const distance = faceapi.euclideanDistance(sample, descriptor);
    if (distance < bestDistance) {
      bestDistance = distance;
    }
  }
  return bestDistance;
}

function getBestKnownFaceDistance(panelState, descriptor, usedKnownPersonIds = new Set()) {
  let bestKnownFace = null;
  let bestDistance = Infinity;

  for (const knownFace of panelState.knownFaces) {
    if (usedKnownPersonIds.has(knownFace.personId)) continue;
    if (!getDescriptorSamples(knownFace).length) continue;
    const distance = getBestDescriptorDistance(knownFace, descriptor);
    if (distance < bestDistance) {
      bestDistance = distance;
      bestKnownFace = knownFace;
    }
  }

  return { knownFace: bestKnownFace, distance: bestDistance };
}

function addDescriptorSample(entry, descriptor) {
  if (!entry || !descriptor) return;
  if (!entry.descriptorSamples) {
    entry.descriptorSamples = getDescriptorSamples(entry).map(cloneDescriptor).filter(Boolean);
  }

  const bestDistance = getBestDescriptorDistance(entry, descriptor);
  if (bestDistance <= 0.12) return;

  entry.descriptorSamples.push(cloneDescriptor(descriptor));
  if (entry.descriptorSamples.length > MAX_DESCRIPTOR_SAMPLES) {
    entry.descriptorSamples.shift();
  }
  entry.descriptor = entry.descriptorSamples[entry.descriptorSamples.length - 1];
}

function updateKnownFaceTrack(panelState, knownFace, descriptor, box) {
  if (descriptor && shouldUpdateKnownFaceDescriptor(panelState, knownFace, descriptor)) {
    addDescriptorSample(knownFace, descriptor);
  }
  knownFace.box = box;
  knownFace.lastSeenAt = panelState.detectionFrameIndex;
}

function shouldUpdateKnownFaceDescriptor(panelState, knownFace, descriptor) {
  if (!descriptor) return false;
  if (!getDescriptorSamples(knownFace).length) return true;
  const distance = getBestDescriptorDistance(knownFace, descriptor);
  return distance <= getDescriptorUpdateMaxDistance(panelState);
}

function cleanupFaceTrackingState(panelState) {
  panelState.pendingFaces = panelState.pendingFaces.filter(
    (pendingFace) => panelState.detectionFrameIndex - pendingFace.lastSeenAt <= PENDING_STALE_MAX_AGE_FRAMES
  );
}

function clearKnownFaceSpatialState(panelState) {
  for (const knownFace of panelState.knownFaces) {
    knownFace.box = null;
    knownFace.lastSeenAt = -Infinity;
  }
}

function getFaceArea(box) {
  return box.width * box.height;
}

function getRenderedFaceMetrics(panelState, box) {
  const sourceWidth = panelState.detectionSourceWidth || panelState.loadedVideoEl.videoWidth || panelState.faceOverlayEl.width || 1;
  const sourceHeight = panelState.detectionSourceHeight || panelState.loadedVideoEl.videoHeight || panelState.faceOverlayEl.height || 1;
  const containerWidth = panelState.faceOverlayEl.width || panelState.videoStageEl.clientWidth || 1;
  const containerHeight = panelState.faceOverlayEl.height || panelState.videoStageEl.clientHeight || 1;
  const containScale = Math.min(containerWidth / sourceWidth, containerHeight / sourceHeight);
  const drawnWidth = sourceWidth * containScale;
  const drawnHeight = sourceHeight * containScale;
  const offsetX = (containerWidth - drawnWidth) / 2;
  const offsetY = (containerHeight - drawnHeight) / 2;

  return {
    x: box.x * containScale + offsetX,
    y: box.y * containScale + offsetY,
    width: box.width * containScale,
    height: box.height * containScale,
    area: box.width * containScale * box.height * containScale,
  };
}

function prepareProcessingFrame(panelState) {
  const sourceWidth = panelState.loadedVideoEl.videoWidth || 0;
  const sourceHeight = panelState.loadedVideoEl.videoHeight || 0;
  if (!sourceWidth || !sourceHeight) return null;

  const scaledWidth = Math.max(64, Math.round(sourceWidth * panelState.videoScale));
  const scaledHeight = Math.max(64, Math.round(sourceHeight * panelState.videoScale));

  if (panelState.processCanvas.width !== scaledWidth) {
    panelState.processCanvas.width = scaledWidth;
  }
  if (panelState.processCanvas.height !== scaledHeight) {
    panelState.processCanvas.height = scaledHeight;
  }

  panelState.processCtx.clearRect(0, 0, scaledWidth, scaledHeight);
  panelState.processCtx.drawImage(panelState.loadedVideoEl, 0, 0, scaledWidth, scaledHeight);
  panelState.detectionSourceWidth = scaledWidth;
  panelState.detectionSourceHeight = scaledHeight;
  return panelState.processCanvas;
}

function updatePanelStatus(panelState) {
  updateStageAction(panelState);
}

function getLargestVisibleFace(panelState) {
  let largestFace = null;
  let largestArea = -1;
  for (const face of panelState.visibleFaces) {
    const area = getRenderedFaceMetrics(panelState, face.box).area;
    if (area > largestArea) {
      largestArea = area;
      largestFace = face;
    }
  }
  return largestFace;
}

function updatePrimaryFaceMemory(panelState) {
  if (panelState.sourceType !== 'camera') return;
  const primaryFace = getLargestVisibleFace(panelState);
  if (!primaryFace) return;
  panelState.primaryPersonId = primaryFace.personId;
  panelState.primarySeenAtMs = performance.now();
}

async function activatePanelVideo(panelState) {

function stopPanelMedia(panelState, { preserveUrl = false } = {}) {

    URL.revokeObjectURL(panelState.loadedVideoUrl);
    panelState.loadedVideoUrl = null;

  if (panelState.mediaStream) {
    for (const track of panelState.mediaStream.getTracks()) track.stop();
    panelState.mediaStream = null;
  }
  panelState.loadedVideoEl.pause();
  panelState.loadedVideoEl.srcObject = null;
  if (!preserveUrl) {
    panelState.loadedVideoEl.removeAttribute('src');
    panelState.loadedVideoEl.load();
  }
  panelState.videoStageEl.classList.remove('hasVideo');
  resetTrackedFaces(panelState);

    video: {

    },
    audio: false,
  });
  panelState.mediaStream = mediaStream;
  panelState.loadedVideoEl.srcObject = mediaStream;
  panelState.loadedVideoUrl = null;
  await activatePanelVideo(panelState);
}

async function ensureFaceApiReady() {
  if (faceApiReady) return;
  if (!window.faceapi) {
    updateFaceApiRail('face-api.js error', 'The local script is missing or failed to load.');
    throw new Error('face-api.js is not available');
  }
  if (!faceApiLoading) {
    updateFaceApiRail('face-api.js ready', 'Loading face-api models...');
    for (const panelState of panelStates) {
      if (panelState.faceIdBarEl) panelState.faceIdBarEl.textContent = 'Persons: loading detector';
    }
    faceApiLoading = Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(FACE_MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL),
    ])
      .then(() => {
        faceApiReady = true;
        updateFaceApiRail('face-api.js ready', 'Models loaded.');
        window.setTimeout(hideFaceApiRail, 250);
      })
      .catch((error) => {
        updateFaceApiRail('face-api.js error', 'Model download failed.');
        throw error;
      });
  }
  await faceApiLoading;
}

function resizeFaceOverlay(panelState) {

function resetTrackedFaces(panelState) {

  panelState.pendingFaces = [];
  panelState.detectionSourceWidth = 0;
  panelState.detectionSourceHeight = 0;
  panelState.primaryPersonId = null;
  panelState.primarySeenAtMs = 0;

}

function clearFaceOverlay(panelState) {

function toggleSunburst() {

function registerDebugTouchTap() {
  const now = performance.now();
  if (now - lastDebugTouchTapAtMs <= DEBUG_TOUCH_TOGGLE_MAX_GAP_MS) {
    debugTouchTapCount += 1;
  } else {
    debugTouchTapCount = 1;
  }
  lastDebugTouchTapAtMs = now;

  if (debugTouchTapCount >= DEBUG_TOUCH_TOGGLE_TAP_COUNT) {
    debugTouchTapCount = 0;
    toggleDebugPanels();
  }
}

if (debugTouchHotspotEl) {
  if (navigator.maxTouchPoints > 0 || 'ontouchstart' in window) {
    debugTouchHotspotEl.addEventListener('touchend', (event) => {
      event.preventDefault();
      registerDebugTouchTap();
    }, { passive: false });
  } else {
    debugTouchHotspotEl.addEventListener('click', registerDebugTouchTap);
  }
}

window.addEventListener('keydown', (event) => {
  if (event.defaultPrevented || event.repeat) return;

  const target = event.target;
  const tagName = target && target.tagName ? target.tagName.toLowerCase() : '';
  if (target && (target.isContentEditable || tagName === 'input' || tagName === 'textarea' || tagName === 'select')) {
    return;
  }

  if (event.key === 'd' || event.key === 'D') {
    event.preventDefault();
    toggleDebugPanels();
    return;
  }

  if (event.key === 's' || event.key === 'S') {
    event.preventDefault();
    toggleSunburst();
  }
});

function startFaceDetectionLoop(panelState) {
  if (!faceApiReady || panelState.loadedVideoEl.paused || panelState.loadedVideoEl.ended) return;
  if (panelState.detectLoopHandle || panelState.detectLoopStartTimeout) return;
  const tick = async () => {
    panelState.detectLoopHandle = 0;
    await detectFacesFrame(panelState);
    if (!panelState.loadedVideoEl.paused && !panelState.loadedVideoEl.ended) {
      panelState.detectLoopHandle = requestAnimationFrame(tick);
    }
  };
  panelState.detectLoopStartTimeout = window.setTimeout(() => {
    panelState.detectLoopStartTimeout = 0;
    if (!panelState.loadedVideoEl.paused && !panelState.loadedVideoEl.ended) {
      panelState.detectLoopHandle = requestAnimationFrame(tick);
    }
  }, VIDEO_LOAD_DETECTION_DELAY_MS);
}

function stopFaceDetectionLoop(panelState) {
  if (panelState.detectLoopStartTimeout) {
    clearTimeout(panelState.detectLoopStartTimeout);
    panelState.detectLoopStartTimeout = 0;
  }
  if (!panelState.detectLoopHandle) return;
  cancelAnimationFrame(panelState.detectLoopHandle);
  panelState.detectLoopHandle = 0;
}

async function detectFacesFrame(panelState) {
  if (!faceApiReady || panelState.loadedVideoEl.readyState < 2) return;
  const now = performance.now();
  if (panelState.detectInFlight) return;
  if (
    PERF_PROFILE.minDetectionIntervalMs > 0
    && now - panelState.lastDetectStartedAtMs < PERF_PROFILE.minDetectionIntervalMs
  ) {
    return;
  }
  panelState.lastDetectStartedAtMs = now;
  panelState.detectInFlight = true;
  try {
    panelState.detectionFrameIndex += 1;
    const processCanvas = prepareProcessingFrame(panelState);
    if (!processCanvas) return;
    const detections = await faceapi
      .detectAllFaces(
        processCanvas,
        new faceapi.TinyFaceDetectorOptions({
          inputSize: PERF_PROFILE.detectorInputSize,
          scoreThreshold: PERF_PROFILE.detectorScoreThreshold,
        })
      )
      .withFaceLandmarks()
      .withFaceDescriptors();
    cleanupFaceTrackingState(panelState);
    panelState.visibleFaces = assignVisibleFaces(panelState, detections);
    updatePrimaryFaceMemory(panelState);
    updateCloudTargetFromPanels();
    updateFaceIdBar(panelState);
    updateFaceSizeBar(panelState);
    updatePanelStatus(panelState);
    drawTrackedFaces(panelState);
  } catch (error) {
    console.error(error);
    stopFaceDetectionLoop(panelState);
  } finally {
    panelState.detectInFlight = false;
  }
}

function assignVisibleFaces(panelState, detections) {
  const nextVisibleFaces = [];
  const usedKnownPersonIds = new Set();
  for (const detection of detections) {
    if (!isDetectionUsable(panelState, detection)) continue;
    const box = detection.detection.box;
    const descriptor = detection.descriptor;
    const person = getOrCreateKnownPerson(panelState, descriptor, box, usedKnownPersonIds);
    if (!person) continue;
    usedKnownPersonIds.add(person.id);
    nextVisibleFaces.push({
      personId: person.id,
      personCode: person.personCode,
      personIndex: person.id,
      box,
      descriptor,
      score: detection.detection.score,
    });
  }
  return nextVisibleFaces;
}

function updateFaceIdBar(panelState) {
  if (!panelState.faceIdBarEl) return;
  panelState.faceIdBarEl.textContent = panelState.visibleFaces.length
    ? `Persons: ${panelState.visibleFaces.map(formatFaceLabel).join(' · ')}`
    : 'Persons: none';
}

function updateFaceSizeBar(panelState) {
  return;
}

function getLargestVisibleFaceAcrossPanels() {
  let bestPanelState = null;
  let bestFace = null;
  let bestArea = -1;
  let secondBestArea = -1;

  for (const panelState of panelStates) {
    const face = getLargestVisibleFace(panelState);
    if (!face) continue;
    const area = getRenderedFaceMetrics(panelState, face.box).area;
    if (area > bestArea) {
      secondBestArea = bestArea;
      bestArea = area;
      bestFace = face;
      bestPanelState = panelState;
    } else if (area > secondBestArea) {
      secondBestArea = area;
    }
  }

  return { panelState: bestPanelState, face: bestFace, area: bestArea, secondArea: secondBestArea };
}

function getWinnerKey(panelState, face) {
  if (!panelState || !face) return null;
  return `${panelState.index}:${face.personId}`;
}

function getPersonForWinnerSnapshot(winnerSnapshot) {
  if (!winnerSnapshot || !winnerSnapshot.face) return null;
  return people.find((entry) => entry.id === winnerSnapshot.face.personId) || null;
}

function isClearGlobalWinner(winnerSnapshot) {
  if (!winnerSnapshot.face || winnerSnapshot.area <= 0) return false;
  if (winnerSnapshot.secondArea <= 0) return true;
  return winnerSnapshot.area >= winnerSnapshot.secondArea * SUN_PULSE_CLEAR_WINNER_RATIO;
}

function updateWinnerPulseState(winnerSnapshot, now) {
  if (!winnerSnapshot.face || !isClearGlobalWinner(winnerSnapshot)) {
    pulsePendingWinnerKey = null;
    pulsePendingSinceMs = 0;
    if (pulseConfirmedWinnerKey && now - pulseConfirmedWinnerSeenAtMs <= SUN_PULSE_CONFIRMED_GRACE_MS) {
      return true;
    }
    pulseConfirmedWinnerKey = null;
    pulseConfirmedWinnerSeenAtMs = 0;
    return false;
  }

  const winnerKey = getWinnerKey(winnerSnapshot.panelState, winnerSnapshot.face);
  if (!winnerKey || winnerKey === pulseConfirmedWinnerKey) {
    pulsePendingWinnerKey = null;
    pulsePendingSinceMs = 0;
    if (winnerKey === pulseConfirmedWinnerKey) {
      pulseConfirmedWinnerSeenAtMs = now;
      return true;
    }
    return false;
  }

  if (pulsePendingWinnerKey !== winnerKey) {
    pulsePendingWinnerKey = winnerKey;
    pulsePendingSinceMs = now;
    return false;
  }

  if (now - pulsePendingSinceMs >= SUN_PULSE_WINNER_HOLD_MS) {
    pulseConfirmedWinnerKey = winnerKey;
    pulsePendingWinnerKey = null;
    pulsePendingSinceMs = 0;
    pulseConfirmedWinnerSeenAtMs = now;
    return true;
  }

  return false;
}

function updateCloudTargetFromPanels() {
  const winnerSnapshot = getLargestVisibleFaceAcrossPanels();
  const now = performance.now();
  const anyFaceDetected = panelStates.some((panelState) => panelState.visibleFaces.length > 0);

  if (anyFaceDetected && !sunPulseHasFaceLatch) {
    sunPulseHasFaceLatch = true;
  } else if (!anyFaceDetected && sunPulseHasFaceLatch) {
    sunPulseHasFaceLatch = false;
  }

  if (sunPulseTransitionCommitted) {
    if (!isCloudReadyForNewWinner()) {
      return;
    }

    resetSunPulseCycle();
    resetWinnerPulseTracking();
    sunPulseLevel = 0;
    sunPulseCurrentFallPerMs = SUN_PULSE_FALL_PER_MS;
    sunPulseMode = 'idle';
    sunPulseHoverPhase = 0;
    transitionFlashLevel = 0;
    transitionFlashDirection = 0;
    transitionFlashSpread = 0;
  }

  const confirmedWinnerStable = updateWinnerPulseState(winnerSnapshot, now);
  const hasClearWinner = winnerSnapshot.face && isClearGlobalWinner(winnerSnapshot);
  const currentWinnerKey = hasClearWinner ? getWinnerKey(winnerSnapshot.panelState, winnerSnapshot.face) : null;
  const currentWinnerPerson = hasClearWinner ? getPersonForWinnerSnapshot(winnerSnapshot) : null;
  const hasConfirmedCurrentWinner = Boolean(
    confirmedWinnerStable &&
    pulseConfirmedWinnerKey &&
    currentWinnerKey &&
    pulseConfirmedWinnerKey === currentWinnerKey
  );

  if (!sunPulseLockedWinnerKey && hasConfirmedCurrentWinner && currentWinnerPerson && shouldPlaySunPulseForPerson(currentWinnerPerson)) {
    sunPulseLockedWinnerKey = currentWinnerKey;
    sunPulseLockedWinnerPerson = currentWinnerPerson;
  }

  sunPulseLockedWinnerVisible = Boolean(
    sunPulseLockedWinnerKey &&
    pulseConfirmedWinnerKey &&
    confirmedWinnerStable &&
    pulseConfirmedWinnerKey === sunPulseLockedWinnerKey
  );

  if (sunPulseLockedWinnerVisible) {
    if (sunPulseLevel < 1 && sunPulseMode !== 'advancing') {
      startSunPulseAdvance();
    }
  } else if (!sunPulseTransitionCommitted && sunPulseLevel > 0) {
    startSunPulseRecede();
  }

  if (!sunPulseLockedWinnerKey && !anyFaceDetected && (!activePerson || isCloudTransitionSettled())) {
    stopActivePersonShift();
  }
}

function isGlobalWinningFace(panelState, face) {
  const winner = getLargestVisibleFaceAcrossPanels();
  return Boolean(
    winner.panelState &&
    winner.face &&
    winner.panelState.index === panelState.index &&
    winner.face.personId === face.personId
  );
}

function getRecentKnownFaceMatch(panelState, descriptor, box, usedKnownPersonIds) {
  let bestKnownFace = null;
  let bestScore = Infinity;
  for (const knownFace of panelState.knownFaces) {
    if (usedKnownPersonIds.has(knownFace.personId)) continue;
    const ageFrames = panelState.detectionFrameIndex - knownFace.lastSeenAt;
    if (ageFrames > RECENT_TRACK_MAX_AGE_FRAMES) continue;
    if (!isSpatialMatch(box, knownFace.box)) continue;

    const spatialScore = getSpatialMatchScore(box, knownFace.box);
    let score = spatialScore;

    if (descriptor && getDescriptorSamples(knownFace).length) {
      const descriptorDistance = getBestDescriptorDistance(knownFace, descriptor);
      if (descriptorDistance > Math.min(panelState.faceDescriptorMaxDistance, getRecentDescriptorMatchMaxDistance(panelState))) continue;
      score += descriptorDistance * 0.75;
    } else if (ageFrames > getRecentSpatialOnlyMaxAgeFrames(panelState)) {
      continue;
    } else {
      score += ageFrames * 0.1;
    }

    if (score < bestScore) {
      bestScore = score;
      bestKnownFace = knownFace;
    }
  }
  return bestKnownFace;
}

function getPrimaryCameraReacquireMatch(panelState, descriptor, usedKnownPersonIds) {
  if (panelState.sourceType !== 'camera') return null;
  if (!descriptor || !panelState.primaryPersonId) return null;
  if (performance.now() - panelState.primarySeenAtMs > CAMERA_PRIMARY_REACQUIRE_MAX_AGE_MS) return null;

  const knownFace = panelState.knownFaces.find((entry) => entry.personId === panelState.primaryPersonId);
  if (!knownFace || usedKnownPersonIds.has(knownFace.personId)) return null;
  if (!getDescriptorSamples(knownFace).length) return null;

  const distance = getBestDescriptorDistance(knownFace, descriptor);
  if (distance > Math.min(panelState.faceDescriptorMaxDistance, CAMERA_PRIMARY_REACQUIRE_MAX_DISTANCE)) return null;
  return knownFace;
}

function getDescriptorKnownFaceMatch(
  panelState,
  descriptor,
  usedKnownPersonIds,
  {
    maxDistance = getGlobalDescriptorMatchMaxDistance(panelState),
    minMargin = getGlobalDescriptorMatchMargin(panelState),
  } = {}
) {
  let bestKnownFace = null;
  let bestDistance = Infinity;
  let secondBestDistance = Infinity;
  const effectiveMaxDistance = Math.min(panelState.faceDescriptorMaxDistance, maxDistance);

  for (const knownFace of panelState.knownFaces) {
    if (usedKnownPersonIds.has(knownFace.personId)) continue;
    if (!getDescriptorSamples(knownFace).length) continue;
    const distance = getBestDescriptorDistance(knownFace, descriptor);
    if (distance < bestDistance) {
      secondBestDistance = bestDistance;
      bestDistance = distance;
      bestKnownFace = knownFace;
    } else if (distance < secondBestDistance) {
      secondBestDistance = distance;
    }
  }

  if (!bestKnownFace || bestDistance > effectiveMaxDistance) return null;
  if (Number.isFinite(secondBestDistance) && secondBestDistance - bestDistance < minMargin) {
    return null;
  }

  return bestKnownFace;
}

function getPendingFaceMatch(panelState, descriptor, box) {
  let bestPendingFace = null;
  let bestScore = Infinity;
  for (const pendingFace of panelState.pendingFaces) {
    if (!isSpatialMatch(box, pendingFace.box)) continue;
    let score = getSpatialMatchScore(box, pendingFace.box);
    if (descriptor && getDescriptorSamples(pendingFace).length) {
      const distance = getBestDescriptorDistance(pendingFace, descriptor);
      if (distance > panelState.faceDescriptorMaxDistance) continue;
      score += distance;
    }
    if (score < bestScore) {
      bestScore = score;
      bestPendingFace = pendingFace;
    }
  }
  return bestPendingFace;
}

function createPendingFace(panelState, descriptor, box) {
  if (descriptor) {
    const nearest = getBestKnownFaceDistance(panelState, descriptor);
    if (nearest.knownFace && nearest.distance <= getMaxNewFaceKnownDistance(panelState)) {
      return;
    }
  }

  panelState.pendingFaces.push({
    descriptor: cloneDescriptor(descriptor),
    descriptorSamples: descriptor ? [cloneDescriptor(descriptor)] : [],
    box,
    firstSeenAt: panelState.detectionFrameIndex,
    lastSeenAt: panelState.detectionFrameIndex,
    seenCount: 1,
  });
}

function promotePendingFaceToKnown(panelState, pendingFace, descriptor, box) {
  const reidentifiedKnownFace = getDescriptorKnownFaceMatch(
    panelState,
    descriptor || pendingFace.descriptor,
    new Set(),
    {
      maxDistance: getRelaxedDescriptorMatchMaxDistance(panelState),
      minMargin: getRelaxedDescriptorMatchMargin(panelState),
    }
  );

  if (reidentifiedKnownFace) {
    updateKnownFaceTrack(panelState, reidentifiedKnownFace, descriptor || pendingFace.descriptor, box);
    panelState.pendingFaces = panelState.pendingFaces.filter(entry => entry !== pendingFace);
    return people.find(person => person.id === reidentifiedKnownFace.personId) || null;
  }

  const person = createTrackedPerson();
  panelState.knownFaces.push({
    personId: person.id,
    personCode: person.personCode,
    descriptor: cloneDescriptor(descriptor || pendingFace.descriptor),
    descriptorSamples: getDescriptorSamples(pendingFace).map(cloneDescriptor),
    box,
    lastSeenAt: panelState.detectionFrameIndex,
  });
  panelState.pendingFaces = panelState.pendingFaces.filter(entry => entry !== pendingFace);
  return person;
}

function getOrCreateKnownPerson(panelState, descriptor, box, usedKnownPersonIds) {
  const recentKnownFace = getRecentKnownFaceMatch(panelState, descriptor, box, usedKnownPersonIds);
  if (recentKnownFace) {
    updateKnownFaceTrack(panelState, recentKnownFace, descriptor, box);
    return people.find(person => person.id === recentKnownFace.personId);
  }

  const primaryCameraMatch = getPrimaryCameraReacquireMatch(panelState, descriptor, usedKnownPersonIds);
  if (primaryCameraMatch) {
    updateKnownFaceTrack(panelState, primaryCameraMatch, descriptor, box);
    return people.find(person => person.id === primaryCameraMatch.personId);
  }

  if (descriptor) {
    const nearest = getBestKnownFaceDistance(panelState, descriptor, usedKnownPersonIds);
    if (nearest.knownFace && nearest.distance <= Math.min(panelState.faceDescriptorMaxDistance, getMaxKnownReuseDistance(panelState))) {
      updateKnownFaceTrack(panelState, nearest.knownFace, descriptor, box);
      return people.find(person => person.id === nearest.knownFace.personId);
    }

    const descriptorMatch = getDescriptorKnownFaceMatch(panelState, descriptor, usedKnownPersonIds);
    if (descriptorMatch) {
      updateKnownFaceTrack(panelState, descriptorMatch, descriptor, box);
      return people.find(person => person.id === descriptorMatch.personId);
    }
  }

  const pendingFace = getPendingFaceMatch(panelState, descriptor, box);
  if (pendingFace) {
    addDescriptorSample(pendingFace, descriptor);
    pendingFace.descriptor = getDescriptorSamples(pendingFace).slice(-1)[0] || pendingFace.descriptor;
    pendingFace.box = box;
    pendingFace.lastSeenAt = panelState.detectionFrameIndex;
    pendingFace.seenCount += 1;
    if (pendingFace.seenCount >= getNewFaceConfirmFrames(panelState)) {
      return promotePendingFaceToKnown(panelState, pendingFace, descriptor, box);
    }
    return null;
  }

  createPendingFace(panelState, descriptor, box);
  return null;
}

function drawTrackedFaces(panelState) {
  clearFaceOverlay(panelState);
  if (!panelState.faceOverlayEl.width || !panelState.faceOverlayEl.height || !panelState.visibleFaces.length) return;

  panelState.faceOverlayCtx.font = '12px ui-monospace, SFMono-Regular, Menlo, monospace';
  panelState.faceOverlayCtx.textBaseline = 'top';
  panelState.faceOverlayCtx.lineWidth = 2;
  for (const face of panelState.visibleFaces) {
    const metrics = getRenderedFaceMetrics(panelState, face.box);
    const x = metrics.x;
    const y = metrics.y;
    const width = metrics.width;
    const height = metrics.height;
    const isWinner = isGlobalWinningFace(panelState, face);
    const strokeColor = isWinner ? 'rgba(110, 255, 160, 0.98)' : 'rgba(187, 233, 255, 0.95)';
    const faceLabel = `ID ${face.personId}`;
    const labelPaddingX = 6;
    const labelPaddingY = 4;
    const labelHeight = 18;
    const labelWidth = panelState.faceOverlayCtx.measureText(faceLabel).width + labelPaddingX * 2;
    const labelX = x;
    const labelY = Math.max(0, y - labelHeight - 4);

    panelState.faceOverlayCtx.strokeStyle = strokeColor;
    panelState.faceOverlayCtx.strokeRect(x, y, width, height);
    panelState.faceOverlayCtx.fillStyle = 'rgba(0, 0, 0, 0.72)';
    panelState.faceOverlayCtx.fillRect(labelX, labelY, labelWidth, labelHeight);
    panelState.faceOverlayCtx.strokeStyle = strokeColor;
    panelState.faceOverlayCtx.strokeRect(labelX, labelY, labelWidth, labelHeight);
    panelState.faceOverlayCtx.fillStyle = strokeColor;
    panelState.faceOverlayCtx.fillText(faceLabel, labelX + labelPaddingX, labelY + labelPaddingY - 1);
  }
}

// ── INIT ─────────────────────────────────────────────────────
function init() {
  registerPerson();
  stopActivePersonShift();
  updateCloudDebug();

  const cameraPanelState = panelStates.find((panelState) => panelState.sourceType === 'camera');
  if (cameraPanelState) {
    startCameraPanel(cameraPanelState).catch((error) => {
      console.error(error);
      updatePanelStatus(cameraPanelState);
    });
  }

  generateCloud();
  let lastRegen = performance.now();
  let needsDraw = true;
  function frame(now) {
    stepCloudTransition();
    updateSunPulse(now);
    updateFps(now);
    updateCloudDebug();
    if (forceCloudRedraw) {
      needsDraw = true;
      forceCloudRedraw = false;
    }
    if (now - lastRegen >= regenMs) {
      const t0 = performance.now();
      generateCloud();
      regenTime = Math.round(performance.now() - t0);
      lastRegen = now;
      needsDraw = true;
    }
    const overlayActive = sunburstEnabled && getSunPulseIntensity() > 0.001;
    const flashActive = sunburstEnabled && transitionFlashLevel > 0.001;
    if (needsDraw || overlayActive || flashActive) {
      cctx.clearRect(0, 0, cloudCan.width, cloudCan.height);
      const scale = Math.max(cloudCan.width / CLOUD_W, cloudCan.height / CLOUD_H);
      const dw = CLOUD_W * scale, dh = CLOUD_H * scale;
      const dx = (cloudCan.width - dw) / 2, dy = (cloudCan.height - dh) / 2;
      cctx.drawImage(buf, BLEED, BLEED, CLOUD_W, CLOUD_H, dx, dy, dw, dh);
      if (overlayActive) drawPulseOverlay(cctx, cloudCan.width, cloudCan.height);
      if (flashActive) drawTransitionFlashOverlay(cctx, cloudCan.width, cloudCan.height);
      needsDraw = false;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

init();
</script>
