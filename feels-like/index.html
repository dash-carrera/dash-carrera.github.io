<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iPad Gallery Face + Mic Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at 20% 20%, #2a3342 0%, #11151d 45%, #090b10 100%);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    color: rgba(255, 255, 255, 0.9);
  }
  #wrap {
    position: relative;
    width: min(96vw, 1280px);
    aspect-ratio: 16 / 9;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    background: #000;
  }
  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  #status {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 6px 8px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 6px;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="wrap">
    <div id="status">Loading camera...</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <script>
    new p5((p) => {
      const W = 1280;
      const H = 720;
      const METER_W = 110;
      const VIEW_W = W - METER_W;
      const MIRROR = true;
      const FACE_OVAL = [
        10, 338, 297, 332, 284, 251, 389, 356, 454, 323,
        361, 288, 397, 365, 379, 378, 400, 377, 152, 148,
        176, 149, 150, 136, 172, 58, 132, 93, 234, 127,
        162, 21, 54, 103, 67, 109
      ];
      const FEATURE_POINTS = [33, 133, 362, 263, 1, 61, 291];

      let video;
      let facemesh;
      let predictions = [];
      let modelLoaded = false;
      let micStream = null;
      let audioContext = null;
      let analyser = null;
      let audioData = null;
      let smoothedMic = 0;
      const statusEl = document.getElementById('status');

      function startMic() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !AudioContextClass) {
          statusEl.textContent = 'Camera ready | Mic unsupported in this browser';
          return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
          .then((stream) => {
            micStream = stream;
            audioContext = new AudioContextClass();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.86;
            audioData = new Uint8Array(analyser.fftSize);
            source.connect(analyser);
          })
          .catch(() => {
            statusEl.textContent = 'Camera ready | Mic permission denied';
          });
      }

      function getMicLevel() {
        if (!analyser || !audioData) return 0;
        analyser.getByteTimeDomainData(audioData);
        let sum = 0;
        for (let i = 0; i < audioData.length; i++) {
          const centered = (audioData[i] - 128) / 128;
          sum += centered * centered;
        }
        const rms = Math.sqrt(sum / audioData.length);
        return p.constrain(rms * 5.5, 0, 1);
      }

      function drawFaceOverlay(scaleX, scaleY) {
        p.push();
        p.noFill();
        p.stroke(120, 245, 255);
        p.strokeWeight(3);

        for (const face of predictions) {
          const mesh = face.scaledMesh;
          if (!mesh || mesh.length === 0) continue;

          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;

          p.beginShape();
          for (const idx of FACE_OVAL) {
            const pt = mesh[idx];
            if (!pt) continue;
            let x = pt[0] * scaleX;
            const y = pt[1] * scaleY;
            if (MIRROR) x = VIEW_W - x;
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
            p.vertex(x, y);
          }
          p.endShape(p.CLOSE);

          p.stroke(149, 255, 190);
          p.rect(minX - 10, minY - 10, (maxX - minX) + 20, (maxY - minY) + 20, 12);

          p.noStroke();
          p.fill(255, 220, 130);
          for (const idx of FEATURE_POINTS) {
            const pt = mesh[idx];
            if (!pt) continue;
            let x = pt[0] * scaleX;
            const y = pt[1] * scaleY;
            if (MIRROR) x = VIEW_W - x;
            p.circle(x, y, 6);
          }

          p.noFill();
          p.stroke(120, 245, 255);
        }
        p.pop();
      }

      function drawMeter(level) {
        const x = VIEW_W;
        p.push();
        p.noStroke();
        p.fill(8, 12, 18, 235);
        p.rect(x, 0, METER_W, H);

        p.stroke(255, 255, 255, 35);
        for (let y = 24; y < H; y += 32) {
          p.line(x + 16, y, x + METER_W - 16, y);
        }

        p.noStroke();
        p.fill(255, 255, 255, 180);
        p.textAlign(p.CENTER, p.TOP);
        p.textSize(12);
        p.text('MIC', x + METER_W * 0.5, 16);

        const meterH = H - 110;
        const meterY = 54;
        const fillH = meterH * level;
        p.fill(18, 24, 32);
        p.rect(x + 26, meterY, METER_W - 52, meterH, 10);

        p.fill(255, 138, 91);
        p.rect(x + 26, meterY + meterH - fillH, METER_W - 52, fillH, 10);

        p.fill(255);
        p.textSize(22);
        p.text(Math.round(level * 100) + '%', x + METER_W * 0.5, H - 44);
        p.pop();
      }

      p.setup = () => {
        const canvas = p.createCanvas(W, H);
        canvas.parent('wrap');

        video = p.createCapture({ video: { facingMode: 'user' }, audio: false }, () => {
          statusEl.textContent = 'Camera ready, loading face model...';
        });
        video.size(VIEW_W, H);
        video.hide();

        facemesh = ml5.facemesh(video, () => {
          modelLoaded = true;
          statusEl.textContent = 'Model ready';
        });
        facemesh.on('predict', (results) => {
          predictions = results;
        });

        startMic();
      };

      p.draw = () => {
        p.background(0);

        const vw = video?.elt?.videoWidth || VIEW_W;
        const vh = video?.elt?.videoHeight || H;
        const scaleX = VIEW_W / vw;
        const scaleY = H / vh;

        p.push();
        if (MIRROR) {
          p.translate(VIEW_W, 0);
          p.scale(-1, 1);
        }
        p.image(video, 0, 0, VIEW_W, H);
        p.pop();

        drawFaceOverlay(scaleX, scaleY);

        p.stroke(255, 255, 255, 120);
        p.line(VIEW_W, 0, VIEW_W, H);

        smoothedMic = p.lerp(smoothedMic, getMicLevel(), 0.18);
        drawMeter(smoothedMic);

        if (!modelLoaded) {
          statusEl.textContent = 'Loading face model...';
        } else {
          statusEl.textContent = `Faces detected: ${predictions.length} | Mic: ${Math.round(smoothedMic * 100)}%`;
        }
      };
    });
  </script>
</body>
</html>
